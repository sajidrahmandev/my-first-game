<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>My First Game</title>
</head>

<body>
    <div class="container">
        <marquee direction="right" scrollamount="10">
            <h1>This is my first game</h1>
            <h3>Thanks for play my game</h3>
        </marquee>

        <div class="player-box" id="pl1">
            <h2>Player One</h2>
            <form>
                <lable for="pl1Name" class="label">Enter your name:</lable>
                <input type="text" id="pl1Name" placeholder="Enter your name"> <br>

                <lable for="pl1Number" class="label">Enter your number:</lable>
                <input type="password" id="pl1Number" placeholder="Enter your number"> <br>

                <input type="submit" value="Submit" id="pl1Btn">
            </form>
        </div>
        
        <div class="player-box" id="pl2">
            <h2>Player Two</h2>
            <form>
                <lable for="pl2Name" class="label">Enter your name:</lable>
                <input type="text" id="pl2Name" placeholder="Enter your name"> <br>

                <lable for="pl2Number" class="label">Enter your number:</lable>
                <input type="password" name="" id="pl2Number" placeholder="Enter your number"> <br>

                <input type="submit" value="Submit" id="pl2Btn">
            </form>
        </div>
        <div id="winner-box">
             <h2 id="winner">The Winner name is</h2>
            <h3 id="pl1Nam">Player 1 Name: </h3>
            <h3 id="pl1Num">Player 1 Number:</h3>
            <h3 id="pl2Nam">Player 2 Name:</h3>
            <h3 id="pl2Num">Player 2 Number:</h3>
        </div>
    </div>


    <script src="main.js"></script>
</body>

</html>
